<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宅ローン毎月返済シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .field label {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 5px;
    display: block;
  }
  .field .sublabel {
    font-size: 0.72rem;
    color: #aaa;
    margin-bottom: 5px;
    display: block;
  }
  input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input[type="number"]:focus { border-color: #1a1a1a; }
  .select-row {
    display: flex;
    gap: 8px;
  }
  .select-row button {
    flex: 1;
    padding: 11px 4px;
    font-size: 0.85rem;
    font-weight: 600;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .select-row button.active {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: #fff;
  }
  .btn-calc {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-calc:active { opacity: 0.8; }
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .error-msg {
    background: #fff0f0;
    color: #c0392b;
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #f5c6c6;
    display: none;
  }
  .error-msg.show { display: block; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .result.show { display: flex; }
  .result-hero {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 18px 14px;
    text-align: center;
  }
  .result-hero-label { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }
  .result-hero-value { font-size: 2.2rem; font-weight: 700; color: #fff; }
  .result-hero-sub { font-size: 0.78rem; color: #aaa; margin-top: 6px; }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-cell {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px;
  }
  .result-cell-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-cell-value { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .result-note {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.8rem;
    color: #ccc;
    line-height: 1.7;
  }
  .result-note .note-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .notice {
    font-size: 0.72rem;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">🏠</span>
    <h1>住宅ローン毎月返済シミュレーター</h1>
    <p>借入金額・年利・返済年数から毎月返済額を試算</p>
  </header>

  <div class="card">
    <div class="field">
      <label>借入金額（円）</label>
      <input type="number" id="principal" inputmode="numeric" placeholder="例：30000000">
    </div>
    <div class="field">
      <label>年利（%）</label>
      <input type="number" id="rate" inputmode="decimal" placeholder="例：1.5">
    </div>
    <div class="field">
      <label>返済年数（年）</label>
      <input type="number" id="years" inputmode="numeric" placeholder="例：35">
    </div>
    <div class="field">
      <label>ボーナス返済額（円）<span style="color:#aaa;font-weight:400;">　任意</span></label>
      <span class="sublabel">年2回分の合計額を入力（例：200000）</span>
      <input type="number" id="bonus" inputmode="numeric" placeholder="例：200000">
    </div>
    <div class="field">
      <label>返済方式</label>
      <div class="select-row" id="methodGroup">
        <button onclick="selectMethod(this, 'equal-payment')" class="active">元利均等返済</button>
        <button onclick="selectMethod(this, 'equal-principal')">元金均等返済</button>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-calc" onclick="calculate()">計算する</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <div class="result" id="result">
    <div class="result-hero">
      <div class="result-hero-label" id="heroLabel">毎月返済額</div>
      <div class="result-hero-value" id="monthlyPayment"></div>
      <div class="result-hero-sub" id="heroSub"></div>
    </div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-label">総返済額</div>
        <div class="result-cell-value" id="totalPayment"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">利息合計</div>
        <div class="result-cell-value" id="totalInterest"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">借入金額</div>
        <div class="result-cell-value" id="principalDisp"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">返済期間</div>
        <div class="result-cell-value" id="yearsDisp"></div>
      </div>
    </div>
    <div class="result-note" id="methodNote">
      <div class="note-label">返済方式について</div>
    </div>
    <div class="notice">
      ※ これは一般向けの簡易シミュレーターです。実際の返済額は手数料・保険料・金利変動により異なります。正式な条件は金融機関の試算をご確認ください。
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  let selectedMethod = 'equal-payment';

  function selectMethod(btn, method) {
    selectedMethod = method;
    document.querySelectorAll('#methodGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function fmt(n) { return Math.round(n).toLocaleString() + ' 円'; }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function calculate() {
    hideError();

    const P     = parseFloat(document.getElementById('principal').value);
    const rate  = parseFloat(document.getElementById('rate').value);
    const years = parseFloat(document.getElementById('years').value);
    const bonus = parseFloat(document.getElementById('bonus').value) || 0;

    if (isNaN(P) || P <= 0) { showError('借入金額を正しく入力してください'); return; }
    if (isNaN(rate) || rate <= 0) { showError('年利を正しく入力してください'); return; }
    if (isNaN(years) || years <= 0) { showError('返済年数を正しく入力してください'); return; }
    if (bonus < 0) { showError('ボーナス返済額は0以上を入力してください'); return; }

    const r = rate / 100 / 12;
    const n = years * 12;

    let monthly, totalPayment, totalInterest, heroSub = '';

    if (selectedMethod === 'equal-payment') {
      // 元利均等返済
      if (r === 0) {
        monthly = P / n;
      } else {
        monthly = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
      }
      const annualBonus = bonus;
      totalPayment  = Math.round(monthly) * n + annualBonus * years;
      totalInterest = totalPayment - P;
      heroSub = '毎月一定額を返済';
    } else {
      // 元金均等返済
      const principalMonthly = P / n;
      const firstInterest    = P * r;
      const firstPayment     = principalMonthly + firstInterest;
      monthly = firstPayment;
      // 総利息 = 元金/月 × r × (n+1)/2 × 12… simplified:
      totalInterest = principalMonthly * r * n * (n + 1) / 2;
      totalPayment  = P + totalInterest + bonus * years;
      heroSub = '初回返済額（以降は逓減）';
    }

    document.getElementById('heroLabel').textContent       = selectedMethod === 'equal-payment' ? '毎月返済額' : '初回返済額';
    document.getElementById('monthlyPayment').textContent  = fmt(monthly);
    document.getElementById('heroSub').textContent         = heroSub;
    document.getElementById('totalPayment').textContent    = fmt(totalPayment);
    document.getElementById('totalInterest').textContent   = fmt(totalInterest);
    document.getElementById('principalDisp').textContent   = fmt(P);
    document.getElementById('yearsDisp').textContent       = years + ' 年（' + n + ' 回）';

    const noteEl = document.getElementById('methodNote');
    if (selectedMethod === 'equal-payment') {
      noteEl.innerHTML = '<div class="note-label">元利均等返済とは</div>返済額が毎月一定。家計管理しやすく、住宅ローンで最も一般的な方式です。返済初期は利息割合が高くなります。';
    } else {
      noteEl.innerHTML = '<div class="note-label">元金均等返済とは</div>毎月の元金返済額が一定。返済初期の負担は大きいですが、総利息は元利均等より少なくなります。';
    }

    if (bonus > 0) {
      noteEl.innerHTML += '<br><br><span style="color:#f0a500;font-size:0.78rem;">※ ボーナス返済（年' + bonus.toLocaleString() + '円）を年2回×' + years + '年分で加算した概算です。</span>';
    }

    document.getElementById('result').classList.add('show');
  }

  function resetAll() {
    ['principal', 'rate', 'years', 'bonus'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('#methodGroup button').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
    selectedMethod = 'equal-payment';
    document.getElementById('result').classList.remove('show');
    hideError();
  }
</script>
</body>
</html>
