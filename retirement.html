<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老後資金シミュレーター</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f0f0f0;
  display:flex;
  justify-content:center;
  padding:16px;
}
.container{width:100%;max-width:480px;}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
  border-radius:12px 12px 0 0;
}

.card{
  background:#fff;
  padding:20px;
}

label{
  font-size:0.8rem;
  color:#555;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0 14px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
}

.result{
  background:#000;
  color:#fff;
  padding:20px;
  display:none;
}
.result.show{display:block;}

.big{
  font-size:1.6rem;
  font-weight:bold;
  margin-bottom:10px;
}

.sub{
  font-size:0.9rem;
  color:#ccc;
}

.share{
  background:#4CAF50;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🏦 老後資金シミュレーター</h1>
</header>

<div class="card">

<label>現在の貯金（円）</label>
<input type="number" id="saving">

<label>毎月の積立（円）</label>
<input type="number" id="monthly">

<label>利回り（%）</label>
<input type="number" id="rate" value="3">

<label>運用年数</label>
<input type="number" id="years" value="30">

<button onclick="calc()">計算する</button>

</div>

<div class="result" id="result">

<div class="big" id="total"></div>
<div class="sub" id="detail"></div>

<button class="share" onclick="share()">📤 シェア</button>

</div>

</div>

<script>
window.onload=()=>{
  saving.value=localStorage.getItem("saving")||"";
  monthly.value=localStorage.getItem("monthly")||"";
  rate.value=localStorage.getItem("rate")||"3";
  years.value=localStorage.getItem("years")||"30";
};

function fmt(n){
  return Math.round(n/10000)+"万円";
}

function calc(){
  const s=Number(saving.value);
  const m=Number(monthly.value);
  const r=Number(rate.value)/100;
  const y=Number(years.value);

  if(!y){alert("入力して");return;}

  localStorage.setItem("saving",s);
  localStorage.setItem("monthly",m);
  localStorage.setItem("rate",rate.value);
  localStorage.setItem("years",y);

  let total=s;

  for(let i=0;i<y;i++){
    total = total*(1+r) + m*12;
  }

  totalEl.innerHTML="老後資金："+fmt(total);
  detail.innerHTML=y+"年後に "+fmt(total);

  result.classList.add("show");
}

function share(){
  const text=totalEl.innerText;

  if(navigator.share){
    navigator.share({
      title:"老後資金",
      text:text,
      url:location.href
    });
  }else{
    navigator.clipboard.writeText(text);
    alert("コピーしたよ");
  }
}
</script>

</body>
</html>
