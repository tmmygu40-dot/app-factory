<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確定申告シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 20px 16px 16px;
    border-radius: 12px 12px 0 0;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label { font-size: 0.8rem; color: #555; margin-bottom: 4px; display: block; }
  input {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input:focus { border-color: #1a1a1a; }
  button {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: 0.8; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
  }
  .result.show { display: block; }
  .result-row { margin-bottom: 16px; }
  .result-row:last-child { margin-bottom: 0; }
  .result-label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
  .result-value { font-size: 1.8rem; font-weight: 700; }
  .result-sub { font-size: 0.85rem; color: #ccc; line-height: 1.8; margin-top: 12px; border-top: 1px solid #333; padding-top: 12px; }
  .result-sub span { color: #fff; font-weight: 600; }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>確定申告シミュレーター</h1>
    <p>売上・経費・控除から税額目安を試算</p>
  </header>

  <div class="card">
    <div>
      <label>売上（円）</label>
      <input type="number" id="revenue" inputmode="numeric" placeholder="例：3000000">
    </div>
    <div>
      <label>経費（円）</label>
      <input type="number" id="expense" inputmode="numeric" placeholder="例：800000">
    </div>
    <div>
      <label>控除額（円）</label>
      <input type="number" id="deduction" inputmode="numeric" placeholder="例：480000">
    </div>
    <button onclick="calculate()">計算する</button>
  </div>

  <div class="result" id="result">
    <div class="result-row">
      <div class="result-label">課税対象額</div>
      <div class="result-value" id="taxBase"></div>
    </div>
    <div class="result-row">
      <div class="result-label">税額目安（×10%）</div>
      <div class="result-value" id="taxAmount"></div>
    </div>
    <div class="result-sub" id="breakdown"></div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  const STORAGE_KEY = 'tax_return_v1';

  function calculate() {
    const revenue   = parseFloat(document.getElementById('revenue').value);
    const expense   = parseFloat(document.getElementById('expense').value);
    const deduction = parseFloat(document.getElementById('deduction').value);

    if ([revenue, expense, deduction].some(v => isNaN(v) || v < 0)) {
      alert('すべての項目に0以上の数値を入力してください');
      return;
    }

    const taxBase   = Math.max(0, Math.round(revenue - expense - deduction));
    const taxAmount = Math.round(taxBase * 0.1);

    document.getElementById('taxBase').textContent   = taxBase.toLocaleString() + ' 円';
    document.getElementById('taxAmount').textContent = taxAmount.toLocaleString() + ' 円';
    document.getElementById('breakdown').innerHTML =
      '売上：<span>' + revenue.toLocaleString() + ' 円</span><br>' +
      '経費：<span>-' + expense.toLocaleString() + ' 円</span><br>' +
      '控除：<span>-' + deduction.toLocaleString() + ' 円</span><br>' +
      '手取り目安：<span>' + (revenue - expense - taxAmount).toLocaleString() + ' 円</span>';

    document.getElementById('result').classList.add('show');
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ revenue, expense, deduction }));
  }

  function load() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const d = JSON.parse(saved);
    document.getElementById('revenue').value   = d.revenue;
    document.getElementById('expense').value   = d.expense;
    document.getElementById('deduction').value = d.deduction;
  }

  load();
</script>
</body>
</html>
