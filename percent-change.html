<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>増減率計算</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 56px;
}

header {
  width: 100%;
  background: #1a1a1a;
  color: #fff;
  padding: 24px 20px 18px;
  text-align: center;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px; }

.card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 16px;
  padding: 24px 20px;
  margin: 20px 16px 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}

.field { margin-bottom: 20px; }
.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.input-wrap { position: relative; }

.input-wrap input {
  width: 100%;
  padding: 14px 16px;
  font-size: 20px;
  font-weight: 700;
  border: 2px solid #ebebeb;
  border-radius: 12px;
  outline: none;
  background: #fafaf8;
  color: #1a1a1a;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
.input-wrap input:focus { border-color: #1a1a1a; background: #fff; }

.calc-btn {
  width: calc(100% - 32px);
  max-width: 480px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  padding: 16px;
  margin-top: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.15s, transform 0.1s;
}
.calc-btn:hover  { opacity: 0.85; }
.calc-btn:active { transform: scale(0.98); }

.result-card {
  display: none;
  width: calc(100% - 32px);
  max-width: 480px;
  border-radius: 16px;
  padding: 28px 20px;
  margin-top: 12px;
  text-align: center;
}
.result-card.show { display: block; }
.result-card.up   { background: #1a1a1a; }
.result-card.down { background: #1a1a1a; }

.result-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.result-main {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
}
.result-main.up   { color: #4ade80; }
.result-main.down { color: #f87171; }
.result-main.flat { color: #fff; }

.result-unit {
  font-size: 20px;
  color: rgba(255,255,255,0.5);
  margin-left: 2px;
}
.result-sub {
  margin-top: 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}

.back-link {
  margin-top: 28px;
  font-size: 13px;
  color: #aaa;
  text-decoration: none;
}
.back-link:hover { color: #555; }
</style>
</head>
<body>

<header>
  <h1>増減率計算</h1>
  <p>元の数値と新しい数値を入力してください</p>
</header>

<div class="card">
  <div class="field">
    <label for="input1">元の数値</label>
    <div class="input-wrap">
      <input type="number" id="input1" inputmode="decimal" placeholder="1000">
    </div>
  </div>
  <div class="field">
    <label for="input2">新しい数値</label>
    <div class="input-wrap">
      <input type="number" id="input2" inputmode="decimal" placeholder="1200">
    </div>
  </div>
</div>

<button class="calc-btn" onclick="calculate()">計算する</button>

<div class="result-card" id="result">
  <div class="result-label" id="resultLabel">増減率</div>
  <div>
    <span class="result-main" id="resultMain"></span><span class="result-unit">%</span>
  </div>
  <div class="result-sub" id="resultSub"></div>
</div>

<a class="back-link" href="index.html">← アプリ一覧に戻る</a>

<script>
const STORAGE_KEY = 'percent_change_v1';

function calculate() {
  const before = parseFloat(document.getElementById('input1').value);
  const after  = parseFloat(document.getElementById('input2').value);

  if (isNaN(before) || isNaN(after) || before === 0) {
    document.getElementById('result').classList.remove('show');
    return;
  }

  const change  = Math.round((after - before) / before * 100);
  const mainEl  = document.getElementById('resultMain');
  const labelEl = document.getElementById('resultLabel');
  const card    = document.getElementById('result');

  mainEl.className = 'result-main';

  if (change > 0) {
    mainEl.textContent  = '+' + change;
    mainEl.classList.add('up');
    labelEl.textContent = '増加率';
  } else if (change < 0) {
    mainEl.textContent  = change;
    mainEl.classList.add('down');
    labelEl.textContent = '減少率';
  } else {
    mainEl.textContent  = '0';
    mainEl.classList.add('flat');
    labelEl.textContent = '増減率';
  }

  document.getElementById('resultSub').textContent =
    `${before.toLocaleString()} → ${after.toLocaleString()}`;
  card.classList.add('show');

  localStorage.setItem(STORAGE_KEY, JSON.stringify({ val1: before, val2: after }));
}

(function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.val1 !== undefined) document.getElementById('input1').value = d.val1;
    if (d.val2 !== undefined) document.getElementById('input2').value = d.val2;
    if (d.val1 !== undefined && d.val2 !== undefined) calculate();
  } catch (e) {}
})();

document.getElementById('input1').addEventListener('input', calculate);
document.getElementById('input2').addEventListener('input', calculate);
</script>
</body>
</html>
