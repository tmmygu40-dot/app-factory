<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1日1問！脳トレ計算</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 28px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .difficulty {
    display: flex;
    gap: 6px;
  }
  .difficulty button {
    padding: 6px 14px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 2px solid #ddd;
    border-radius: 99px;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .difficulty button.active {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: #fff;
  }
  .question-wrap {
    width: 100%;
    background: #f7f7f7;
    border-radius: 14px;
    padding: 28px 16px;
    text-align: center;
  }
  .question-label { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; letter-spacing: 0.05em; }
  .question-text {
    font-size: 2.8rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
    line-height: 1.2;
  }
  .input-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .answer-input {
    width: 100%;
    padding: 16px;
    font-size: 1.6rem;
    font-weight: 700;
    text-align: center;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    color: #1a1a1a;
  }
  .answer-input:focus { border-color: #1a1a1a; }
  .answer-input.correct { border-color: #2ecc71; background: #f0fff6; color: #27ae60; }
  .answer-input.wrong   { border-color: #e74c3c; background: #fff5f5; color: #c0392b; }
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.8; }
  .btn-submit:disabled {
    background: #ccc;
    cursor: default;
  }
  .result-box {
    width: 100%;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.correct { background: #f0fff6; border: 2px solid #2ecc71; }
  .result-box.wrong   { background: #fff5f5; border: 2px solid #e74c3c; }
  .result-icon { font-size: 2rem; margin-bottom: 4px; }
  .result-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .result-box.correct .result-title { color: #27ae60; }
  .result-box.wrong   .result-title { color: #c0392b; }
  .result-comment { font-size: 0.85rem; color: #555; }
  .result-answer  { font-size: 0.82rem; color: #888; margin-top: 4px; }
  .btn-next {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #1a1a1a;
    font-size: 0.95rem;
    font-weight: 700;
    border: 2px solid #1a1a1a;
    border-radius: 10px;
    cursor: pointer;
    display: none;
  }
  .btn-next.show { display: block; }
  .btn-next:active { background: #f5f5f5; }
  .score-bar {
    width: 100%;
    background: #f7f7f7;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .score-item-label { font-size: 0.7rem; color: #aaa; margin-bottom: 3px; }
  .score-item-value { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; }
  .score-item-value.green { color: #27ae60; }
  .score-item-value.red   { color: #e74c3c; }
  .result-panel {
    background: #1a1a1a;
    padding: 16px;
    border-radius: 0 0 12px 12px;
    display: none;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">🧠</span>
    <h1>1日1問！脳トレ計算</h1>
    <p>毎回ランダムな問題で頭の体操</p>
  </header>

  <div class="card">
    <div class="difficulty" id="diffGroup">
      <button onclick="setDiff(this,'easy')"   class="active">かんたん</button>
      <button onclick="setDiff(this,'normal')"            >ふつう</button>
      <button onclick="setDiff(this,'hard')"              >むずかしい</button>
    </div>

    <div class="question-wrap">
      <div class="question-label">問題</div>
      <div class="question-text" id="questionText">?</div>
    </div>

    <div class="score-bar">
      <div>
        <div class="score-item-label">正解</div>
        <div class="score-item-value green" id="correctCount">0</div>
      </div>
      <div>
        <div class="score-item-label">不正解</div>
        <div class="score-item-value red" id="wrongCount">0</div>
      </div>
      <div>
        <div class="score-item-label">正解率</div>
        <div class="score-item-value" id="accuracy">―</div>
      </div>
    </div>

    <div class="input-wrap">
      <input type="number" id="answerInput" class="answer-input"
             inputmode="numeric" placeholder="答えを入力"
             onkeydown="if(event.key==='Enter')submitAnswer()">
      <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">答える</button>
      <div class="result-box" id="resultBox">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-comment" id="resultComment"></div>
        <div class="result-answer" id="resultAnswer"></div>
      </div>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  let currentAnswer = 0;
  let currentDiff   = 'easy';
  let correctCount  = 0;
  let wrongCount    = 0;
  let answered      = false;

  const CORRECT_MSGS = ['ナイス！', '正解！', 'やった！', 'パーフェクト！', 'その調子！'];
  const WRONG_MSGS   = ['惜しい！', 'もう一問！', 'ドンマイ！', '次は正解しよう！', 'チャレンジ！'];

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function setDiff(btn, diff) {
    currentDiff = diff;
    document.querySelectorAll('#diffGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    nextQuestion();
  }

  function generateQuestion() {
    const ops = ['+', '-', '×', '÷'];
    let a, b, op, answer, display;

    if (currentDiff === 'easy') {
      op = ops[rand(0, 3)];
      if (op === '+')  { a = rand(1, 20);  b = rand(1, 20);  answer = a + b; }
      else if (op === '-') { a = rand(5, 20); b = rand(1, a); answer = a - b; }
      else if (op === '×') { a = rand(1, 9);  b = rand(1, 9); answer = a * b; }
      else { b = rand(1, 9); answer = rand(1, 9); a = b * answer; }
    } else if (currentDiff === 'normal') {
      op = ops[rand(0, 3)];
      if (op === '+')  { a = rand(10, 99);  b = rand(10, 99); answer = a + b; }
      else if (op === '-') { a = rand(20, 99); b = rand(1, a); answer = a - b; }
      else if (op === '×') { a = rand(2, 19); b = rand(2, 12); answer = a * b; }
      else { b = rand(2, 12); answer = rand(2, 12); a = b * answer; }
    } else {
      op = ops[rand(0, 3)];
      if (op === '+')  { a = rand(50, 999); b = rand(50, 999); answer = a + b; }
      else if (op === '-') { a = rand(100, 999); b = rand(10, a); answer = a - b; }
      else if (op === '×') { a = rand(11, 49); b = rand(11, 29); answer = a * b; }
      else { b = rand(3, 19); answer = rand(3, 19); a = b * answer; }
    }

    return { display: a + ' ' + op + ' ' + b + ' ＝ ?', answer };
  }

  function nextQuestion() {
    const q = generateQuestion();
    currentAnswer = q.answer;
    answered = false;
    document.getElementById('questionText').textContent = q.display;
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').className = 'answer-input';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('answerInput').focus();
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('resultBox').className = 'result-box';
    document.getElementById('nextBtn').className = 'btn-next';
  }

  function submitAnswer() {
    if (answered) return;
    const input = document.getElementById('answerInput');
    const val   = parseFloat(input.value);
    if (input.value === '' || isNaN(val)) {
      input.style.borderColor = '#f0a500';
      setTimeout(() => { input.style.borderColor = '#ddd'; }, 600);
      return;
    }
    answered = true;
    input.disabled = true;
    document.getElementById('submitBtn').disabled = true;

    const isCorrect = val === currentAnswer;
    const resultBox = document.getElementById('resultBox');

    if (isCorrect) {
      correctCount++;
      input.className = 'answer-input correct';
      resultBox.className = 'result-box correct show';
      document.getElementById('resultIcon').textContent    = '⭕';
      document.getElementById('resultTitle').textContent   = '正解！';
      document.getElementById('resultComment').textContent = CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)];
      document.getElementById('resultAnswer').textContent  = '';
    } else {
      wrongCount++;
      input.className = 'answer-input wrong';
      resultBox.className = 'result-box wrong show';
      document.getElementById('resultIcon').textContent    = '❌';
      document.getElementById('resultTitle').textContent   = '不正解…';
      document.getElementById('resultComment').textContent = WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
      document.getElementById('resultAnswer').textContent  = '正解は　' + currentAnswer;
    }

    const total = correctCount + wrongCount;
    document.getElementById('correctCount').textContent = correctCount;
    document.getElementById('wrongCount').textContent   = wrongCount;
    document.getElementById('accuracy').textContent     = Math.round(correctCount / total * 100) + '%';
    document.getElementById('nextBtn').className = 'btn-next show';
  }

  nextQuestion();
</script>
</body>
</html>
