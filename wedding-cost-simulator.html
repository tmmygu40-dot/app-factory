<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結婚費用シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field label { font-size: 0.8rem; color: #555; margin-bottom: 5px; display: block; }
  .field .sublabel { font-size: 0.72rem; color: #aaa; margin-bottom: 6px; display: block; }
  input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input[type="number"]:focus { border-color: #1a1a1a; }
  .select-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .select-grid button {
    width: 100%;
    padding: 12px 14px;
    font-size: 0.88rem;
    font-weight: 600;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #555;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .select-grid button.active {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: #fff;
  }
  .live-preview {
    background: #f7f7f7;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: #555;
    display: none;
  }
  .live-preview.show { display: block; }
  .live-preview span { font-weight: 700; color: #1a1a1a; }
  .btn-calc {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-calc:active { opacity: 0.8; }
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .error-msg {
    background: #fff0f0;
    color: #c0392b;
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #f5c6c6;
    display: none;
  }
  .error-msg.show { display: block; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .result.show { display: flex; }
  .result-hero {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 20px 14px;
    text-align: center;
  }
  .result-hero-label { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }
  .result-hero-value { font-size: 2.2rem; font-weight: 700; color: #fff; line-height: 1.2; }
  .result-hero-sub { font-size: 0.78rem; color: #aaa; margin-top: 8px; }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-cell {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px;
  }
  .result-cell-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-cell-value { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .result-cell-value.green { color: #2ecc71; }
  .result-cell-value.red   { color: #ff6b6b; }
  .result-breakdown {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
  }
  .breakdown-label { font-size: 0.7rem; color: #aaa; margin-bottom: 10px; }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #ccc;
    padding: 5px 0;
    border-bottom: 1px solid #333;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row span { color: #fff; font-weight: 600; }
  .result-comment {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
    font-size: 0.82rem;
    color: #ccc;
    line-height: 1.7;
  }
  .result-comment .comment-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-comment .comment-text { color: #fff; font-weight: 600; }
  .notice {
    font-size: 0.72rem;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">💍</span>
    <h1>結婚費用シミュレーター</h1>
    <p>式・披露宴・新生活費の総額を試算</p>
  </header>

  <div class="card">
    <div class="field">
      <label>結婚式の規模</label>
      <div class="select-grid" id="scaleGroup">
        <button onclick="selectScale(this,'small')"  class="active">🌿 小規模　1人あたり約15万円（家族・親族中心）</button>
        <button onclick="selectScale(this,'normal')">💐 普通　　1人あたり約22万円（一般的な披露宴）</button>
        <button onclick="selectScale(this,'luxury')">✨ 豪華　　1人あたり約30万円（高級会場・演出充実）</button>
      </div>
    </div>

    <div class="field">
      <label>招待人数（人）</label>
      <input type="number" id="guests" inputmode="numeric" placeholder="例：60" oninput="updatePreview()">
    </div>

    <div class="live-preview" id="weddingPreview">
      式・披露宴費用の目安：<span id="previewVal">―</span>
    </div>

    <div class="field">
      <label>ご祝儀（1人あたり）（円）</label>
      <input type="number" id="giftPerPerson" inputmode="numeric" placeholder="例：30000" value="30000">
    </div>

    <div class="field">
      <label>新生活費（家具・引越しなど）（円）</label>
      <span class="sublabel">引越し費用・家具家電・インテリアなど</span>
      <input type="number" id="moving" inputmode="numeric" placeholder="例：1000000">
    </div>

    <div class="field">
      <label>指輪代（円）<span style="color:#aaa;font-weight:400;">　任意</span></label>
      <input type="number" id="ring" inputmode="numeric" placeholder="例：500000">
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-calc" onclick="calculate()">計算する</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <div class="result" id="result">
    <div class="result-hero">
      <div class="result-hero-label">総費用（支出合計）</div>
      <div class="result-hero-value" id="grandTotal"></div>
      <div class="result-hero-sub" id="heroSub"></div>
    </div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-label">自己負担額</div>
        <div class="result-cell-value" id="selfBurden"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">ご祝儀合計</div>
        <div class="result-cell-value green" id="giftTotal"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">式・披露宴費用</div>
        <div class="result-cell-value" id="weddingCost"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">新生活＋指輪</div>
        <div class="result-cell-value" id="otherCost"></div>
      </div>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-label">費用内訳</div>
      <div class="breakdown-row">式・披露宴 <span id="bWedding"></span></div>
      <div class="breakdown-row">新生活費   <span id="bMoving"></span></div>
      <div class="breakdown-row">指輪代     <span id="bRing"></span></div>
      <div class="breakdown-row">ご祝儀収入 <span id="bGift" style="color:#2ecc71"></span></div>
    </div>
    <div class="result-comment">
      <div class="comment-label">ひとこと</div>
      <div class="comment-text" id="commentText"></div>
    </div>
    <div class="notice">
      ※ 地域・式場・プランにより費用は大きく異なります。ご祝儀額も関係性によって変わります。あくまで目安としてご参考ください。
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  const UNIT_COST = { small: 150000, normal: 220000, luxury: 300000 };
  let selectedScale = 'small';

  function selectScale(btn, scale) {
    selectedScale = scale;
    document.querySelectorAll('#scaleGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updatePreview();
  }

  function updatePreview() {
    const guests  = parseFloat(document.getElementById('guests').value);
    const preview = document.getElementById('weddingPreview');
    if (!isNaN(guests) && guests > 0) {
      const cost = UNIT_COST[selectedScale] * guests;
      document.getElementById('previewVal').textContent = cost.toLocaleString() + ' 円';
      preview.classList.add('show');
    } else {
      preview.classList.remove('show');
    }
  }

  function fmt(n) { return Math.round(n).toLocaleString() + ' 円'; }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function calculate() {
    hideError();
    const guests        = parseFloat(document.getElementById('guests').value);
    const giftPerPerson = parseFloat(document.getElementById('giftPerPerson').value);
    const moving        = parseFloat(document.getElementById('moving').value) || 0;
    const ring          = parseFloat(document.getElementById('ring').value)   || 0;

    if (isNaN(guests) || guests < 1)         { showError('招待人数を1人以上で入力してください'); return; }
    if (isNaN(giftPerPerson) || giftPerPerson < 0) { showError('ご祝儀額を正しく入力してください'); return; }
    if (moving < 0) { showError('新生活費は0以上で入力してください'); return; }
    if (ring   < 0) { showError('指輪代は0以上で入力してください'); return; }

    const weddingCost = Math.round(UNIT_COST[selectedScale] * guests);
    const giftTotal   = Math.round(giftPerPerson * guests);
    const otherCost   = moving + ring;
    const grandTotal  = weddingCost + otherCost;
    const selfBurden  = Math.max(0, grandTotal - giftTotal);
    const giftDiff    = giftTotal - weddingCost;

    const scaleNames  = { small: '小規模', normal: '普通', luxury: '豪華' };

    document.getElementById('grandTotal').textContent  = fmt(grandTotal);
    document.getElementById('heroSub').textContent     =
      scaleNames[selectedScale] + ' / ' + guests + '人招待';
    document.getElementById('selfBurden').textContent  = fmt(selfBurden);
    document.getElementById('giftTotal').textContent   = fmt(giftTotal);
    document.getElementById('weddingCost').textContent = fmt(weddingCost);
    document.getElementById('otherCost').textContent   = fmt(otherCost);
    document.getElementById('bWedding').textContent    = fmt(weddingCost);
    document.getElementById('bMoving').textContent     = moving > 0 ? fmt(moving) : '―';
    document.getElementById('bRing').textContent       = ring   > 0 ? fmt(ring)   : '―';
    document.getElementById('bGift').textContent       = '▲ ' + fmt(giftTotal);

    let comment;
    if (selfBurden === 0) {
      comment = 'ご祝儀が式費用を上回っており、式・披露宴は実質自己負担ゼロです。新生活費の準備に集中できます。';
    } else if (giftDiff >= 0) {
      comment = 'ご祝儀で式費用はカバーできます。新生活費・指輪代の自己負担 ' + fmt(selfBurden) + ' を事前に準備しておきましょう。';
    } else if (selfBurden < 1000000) {
      comment = '自己負担は ' + fmt(selfBurden) + ' の見込みです。式の費用は大きいですが、ご祝儀でかなりの部分が補えます。';
    } else {
      comment = '自己負担が ' + fmt(selfBurden) + ' と大きめです。式の規模や人数を調整するか、事前の貯蓄計画を立てることをおすすめします。';
    }
    document.getElementById('commentText').textContent = comment;
    document.getElementById('result').classList.add('show');
  }

  function resetAll() {
    document.getElementById('guests').value        = '';
    document.getElementById('giftPerPerson').value = '30000';
    document.getElementById('moving').value        = '';
    document.getElementById('ring').value          = '';
    selectedScale = 'small';
    document.querySelectorAll('#scaleGroup button').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
    document.getElementById('weddingPreview').classList.remove('show');
    document.getElementById('result').classList.remove('show');
    hideError();
  }
</script>
</body>
</html>
