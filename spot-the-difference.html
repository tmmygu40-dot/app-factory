<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>間違い探し（簡単）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }

  .card {
    background: #fff;
    padding: 24px 16px 28px;
    border-radius: 0 0 12px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* スコア */
  .score-row {
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #f7f7f7;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .score-label { font-size: 0.7rem; color: #aaa; margin-bottom: 3px; }
  .score-value { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; }
  .score-value.green { color: #27ae60; }
  .score-value.red   { color: #e74c3c; }

  /* 問題 */
  .question-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .q-num {
    background: #1a1a1a;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
  }
  .q-type {
    font-size: 0.78rem;
    color: #aaa;
  }
  .question-label {
    width: 100%;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a1a;
    padding: 12px 16px;
    background: #f7f7f7;
    border-radius: 10px;
  }

  /* ボックスグリッド */
  .box-grid {
    width: 100%;
    display: grid;
    gap: 10px;
  }
  .box-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .box-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .box-item {
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s, opacity 0.1s;
    aspect-ratio: 1;
    border: 3px solid transparent;
  }
  .box-item:active { transform: scale(0.93); }
  .box-item.correct-anim { border-color: #27ae60 !important; }
  .box-item.wrong-anim   { border-color: #e74c3c !important; opacity: 0.5; }

  /* フィードバック */
  .feedback-box {
    width: 100%;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: #f0fff6; border: 2px solid #2ecc71; }
  .feedback-box.wrong   { background: #fff5f5; border: 2px solid #e74c3c; }
  .feedback-icon    { font-size: 1.8rem; margin-bottom: 4px; }
  .feedback-title   { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  .feedback-box.correct .feedback-title { color: #27ae60; }
  .feedback-box.wrong   .feedback-title { color: #e74c3c; }
  .feedback-desc    { font-size: 0.82rem; color: #666; }

  /* ボタン */
  .btn-next {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
  }
  .btn-next.show { display: block; }
  .btn-next:active { opacity: 0.8; }

  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">🔍</span>
    <h1>間違い探し（簡単）</h1>
    <p>1つだけ違うものをタップしよう</p>
  </header>

  <div class="card">
    <div class="score-row">
      <div>
        <div class="score-label">問題数</div>
        <div class="score-value" id="qNum">0</div>
      </div>
      <div>
        <div class="score-label">正解</div>
        <div class="score-value green" id="correctCount">0</div>
      </div>
      <div>
        <div class="score-label">不正解</div>
        <div class="score-value red" id="wrongCount">0</div>
      </div>
      <div>
        <div class="score-label">正解率</div>
        <div class="score-value" id="accuracy">―</div>
      </div>
    </div>

    <div class="question-meta">
      <span class="q-num" id="qNumBadge">Q1</span>
      <span class="q-type" id="qTypeBadge"></span>
    </div>
    <div class="question-label" id="questionLabel">1つだけ違うものはどれ？</div>

    <div class="box-grid cols-2" id="boxGrid"></div>

    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-icon" id="fbIcon"></div>
      <div class="feedback-title" id="fbTitle"></div>
      <div class="feedback-desc" id="fbDesc"></div>
    </div>

    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  let qCount   = 0;
  let correct  = 0;
  let wrong    = 0;
  let answered = false;
  let oddIndex = -1;

  const CORRECT_MSGS = ['正解！よく見つけた！', '正解！すごい！', '正解！さすが！', '完璧！', 'ナイス！'];
  const WRONG_MSGS   = ['惜しい！違います', '不正解！もう一問！', 'ドンマイ！次こそ！'];

  function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
  function pick(arr, n) { return shuffle(arr).slice(0, n); }

  // ── 問題生成ロジック ──
  const GENERATORS = [

    // 色が1つ違う
    () => {
      const palettes = [
        { base: '#e74c3c', odd: '#3498db', label: '赤' },
        { base: '#3498db', odd: '#e74c3c', label: '青' },
        { base: '#27ae60', odd: '#e67e22', label: '緑' },
        { base: '#f1c40f', odd: '#9b59b6', label: '黄' },
        { base: '#9b59b6', odd: '#27ae60', label: '紫' },
        { base: '#e67e22', odd: '#1a1a1a', label: '橙' },
      ];
      const p    = palettes[rand(0, palettes.length - 1)];
      const cnt  = rand(4, 6);
      const items = Array(cnt).fill({ bg: p.base, text: '', type: 'color' });
      return {
        type: '色',
        label: '1つだけ違う色はどれ？',
        items,
        odd: { bg: p.odd, text: '', type: 'color' },
        count: cnt,
      };
    },

    // 数字が1つ違う
    () => {
      const base = rand(1, 9);
      let   odd  = rand(1, 9);
      while (odd === base) odd = rand(1, 9);
      const cnt  = rand(4, 6);
      const bg   = ['#2a2a2a','#3d5a80','#6b4226','#1a3a2a','#4a1a4a'][rand(0,4)];
      return {
        type: '数字',
        label: '1つだけ違う数字はどれ？',
        items: Array(cnt).fill({ bg, text: String(base), type: 'number' }),
        odd:   { bg, text: String(odd),  type: 'number' },
        count: cnt,
      };
    },

    // 文字が1つ違う
    () => {
      const sets = [
        { base: 'あ', odd: 'お' }, { base: 'い', odd: 'り' },
        { base: 'か', odd: 'な' }, { base: 'き', odd: 'さ' },
        { base: 'A', odd: 'H'  }, { base: 'O', odd: 'Q'  },
        { base: 'E', odd: 'F'  }, { base: 'B', odd: 'D'  },
        { base: '○', odd: '◯' }, { base: '◆', odd: '◇' },
        { base: '▲', odd: '△' }, { base: '■', odd: '□' },
      ];
      const s   = sets[rand(0, sets.length - 1)];
      const cnt = rand(4, 6);
      const bg  = ['#1a3a5a','#3a1a1a','#1a3a1a','#3a2a1a','#2a1a3a'][rand(0,4)];
      return {
        type: '文字',
        label: '1つだけ違う文字はどれ？',
        items: Array(cnt).fill({ bg, text: s.base, type: 'char' }),
        odd:   { bg, text: s.odd,  type: 'char' },
        count: cnt,
      };
    },

    // 大きさが1つ違う（数字のフォントサイズ）
    () => {
      const n   = rand(1, 9);
      const cnt = rand(4, 6);
      const bg  = '#1a1a1a';
      return {
        type: 'サイズ',
        label: '1つだけ大きさが違うのはどれ？',
        items: Array(cnt).fill({ bg, text: String(n), type: 'size', fontSize: '1.8rem' }),
        odd:   { bg, text: String(n), type: 'size', fontSize: '3rem' },
        count: cnt,
      };
    },
  ];

  function nextQuestion() {
    answered = false;
    qCount++;
    document.getElementById('feedbackBox').className = 'feedback-box';
    document.getElementById('nextBtn').className     = 'btn-next';

    const gen  = GENERATORS[rand(0, GENERATORS.length - 1)];
    const q    = gen();
    const cnt  = q.count;
    oddIndex   = rand(0, cnt - 1);

    // アイテム配列作成
    const arr = [...q.items];
    arr[oddIndex] = q.odd;

    // グリッド列数
    const grid = document.getElementById('boxGrid');
    grid.className = 'box-grid ' + (cnt <= 4 ? 'cols-2' : 'cols-3');
    grid.innerHTML = '';

    arr.forEach((item, i) => {
      const btn = document.createElement('div');
      btn.className = 'box-item';
      btn.style.background = item.bg;
      btn.style.color = '#fff';
      btn.style.fontSize = item.fontSize || '1.8rem';
      btn.textContent = item.text;
      btn.dataset.index = i;
      btn.addEventListener('click', () => onTap(i, btn));
      grid.appendChild(btn);
    });

    document.getElementById('qNumBadge').textContent  = 'Q' + qCount;
    document.getElementById('qTypeBadge').textContent = '種類：' + q.type;
    document.getElementById('questionLabel').textContent = q.label;
    document.getElementById('qNum').textContent = qCount;
  }

  function onTap(i, btn) {
    if (answered) return;
    answered = true;

    const isCorrect = i === oddIndex;
    const fb = document.getElementById('feedbackBox');
    const allBtns = document.querySelectorAll('.box-item');

    if (isCorrect) {
      correct++;
      btn.classList.add('correct-anim');
      fb.className = 'feedback-box correct show';
      document.getElementById('fbIcon').textContent  = '⭕';
      document.getElementById('fbTitle').textContent = CORRECT_MSGS[rand(0, CORRECT_MSGS.length - 1)];
      document.getElementById('fbDesc').textContent  = '';
    } else {
      wrong++;
      btn.classList.add('wrong-anim');
      allBtns[oddIndex].classList.add('correct-anim');
      fb.className = 'feedback-box wrong show';
      document.getElementById('fbIcon').textContent  = '❌';
      document.getElementById('fbTitle').textContent = WRONG_MSGS[rand(0, WRONG_MSGS.length - 1)];
      document.getElementById('fbDesc').textContent  = '正解は光っているボックスです';
    }

    const total = correct + wrong;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent   = wrong;
    document.getElementById('accuracy').textContent     = Math.round(correct / total * 100) + '%';
    document.getElementById('nextBtn').className = 'btn-next show';
  }

  nextQuestion();
</script>
</body>
</html>
