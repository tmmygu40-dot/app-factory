<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生あと何日？</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .field label { font-size: 0.8rem; color: #555; margin-bottom: 5px; display: block; }
  .field .sublabel { font-size: 0.72rem; color: #aaa; margin-bottom: 5px; display: block; }
  input {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input:focus { border-color: #1a1a1a; }
  .btn-calc {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-calc:active { opacity: 0.8; }
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .error-msg {
    background: #fff0f0;
    color: #c0392b;
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #f5c6c6;
    display: none;
  }
  .error-msg.show { display: block; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 24px 16px 20px;
    border-radius: 0 0 12px 12px;
    display: none;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
  .result.show { display: flex; }
  .result-hero {
    padding: 8px 0 4px;
  }
  .result-hero-label {
    font-size: 0.8rem;
    color: #aaa;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .result-days {
    font-size: 4.5rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
  }
  .result-days-unit {
    font-size: 1.4rem;
    font-weight: 700;
    color: #aaa;
    margin-left: 4px;
    letter-spacing: 0;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-cell {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 14px 10px;
  }
  .result-cell-label { font-size: 0.7rem; color: #aaa; margin-bottom: 6px; }
  .result-cell-value { font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1; }
  .result-cell-unit  { font-size: 0.75rem; color: #888; margin-top: 3px; }
  .life-bar-wrap {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 14px;
  }
  .life-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: #aaa;
    margin-bottom: 8px;
  }
  .life-bar-track {
    background: #3a3a3a;
    border-radius: 99px;
    height: 12px;
    overflow: hidden;
  }
  .life-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #4a9eff, #a78bfa);
    transition: width 0.6s ease;
  }
  .life-bar-pct {
    font-size: 0.78rem;
    color: #ccc;
    margin-top: 6px;
    text-align: right;
  }
  .result-message {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.9rem;
    color: #fff;
    font-weight: 600;
    line-height: 1.6;
  }
  .result-message .msg-sub {
    font-size: 0.78rem;
    color: #aaa;
    font-weight: 400;
    margin-top: 4px;
  }
  .notice {
    font-size: 0.72rem;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #333;
    padding-top: 10px;
    text-align: left;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">⏳</span>
    <h1>人生あと何日？</h1>
    <p>残りの時間を数字で実感する</p>
  </header>

  <div class="card">
    <div class="field">
      <label>生年月日</label>
      <input type="date" id="birthday">
    </div>
    <div class="field">
      <label>想定寿命（歳）</label>
      <span class="sublabel">日本人の平均寿命は男性約81歳・女性約87歳</span>
      <input type="number" id="lifespan" inputmode="numeric" placeholder="例：85" value="85">
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-calc" onclick="calculate()">計算する</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <div class="result" id="result">
    <div class="result-hero">
      <div class="result-hero-label">今日から残り</div>
      <div>
        <span class="result-days" id="remainDays"></span><span class="result-days-unit">日</span>
      </div>
    </div>

    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-label">残り年数</div>
        <div class="result-cell-value" id="remainYears"></div>
        <div class="result-cell-unit">年</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">残り時間</div>
        <div class="result-cell-value" id="remainHours"></div>
        <div class="result-cell-unit">時間</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">現在の年齢</div>
        <div class="result-cell-value" id="currentAge"></div>
        <div class="result-cell-unit">歳</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">残り週数</div>
        <div class="result-cell-value" id="remainWeeks"></div>
        <div class="result-cell-unit">週</div>
      </div>
    </div>

    <div class="life-bar-wrap">
      <div class="life-bar-label">
        <span>誕生</span>
        <span id="lifeBarTitle"></span>
      </div>
      <div class="life-bar-track">
        <div class="life-bar-fill" id="lifeBarFill" style="width:0%"></div>
      </div>
      <div class="life-bar-pct" id="lifeBarPct"></div>
    </div>

    <div class="result-message" id="message"></div>

    <div class="notice">
      ※ あくまで試算です。寿命は個人差があります。残り時間を「どう使うか」を考えるきっかけにしてください。
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function calculate() {
    hideError();
    const birthday = document.getElementById('birthday').value;
    const lifespan = parseFloat(document.getElementById('lifespan').value);

    if (!birthday) { showError('生年月日を入力してください'); return; }
    if (isNaN(lifespan) || lifespan < 1 || lifespan > 150) {
      showError('想定寿命を正しく入力してください（1〜150）'); return;
    }

    const today   = new Date();
    today.setHours(0, 0, 0, 0);
    const birth   = new Date(birthday);
    birth.setHours(0, 0, 0, 0);

    if (birth > today) { showError('生年月日は今日より前の日付を入力してください'); return; }

    const deathDate = new Date(birth);
    deathDate.setFullYear(birth.getFullYear() + lifespan);

    if (deathDate <= today) {
      showError('想定寿命をすでに超えています。寿命の設定を見直してください');
      return;
    }

    const msPerDay    = 86400000;
    const remainMs    = deathDate - today;
    const remainDays  = Math.floor(remainMs / msPerDay);
    const remainWeeks = Math.floor(remainDays / 7);
    const remainYears = (remainDays / 365.25).toFixed(1);
    const remainHours = Math.floor(remainMs / 3600000).toLocaleString();

    // 現在の年齢
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;

    // 経過率
    const totalMs    = deathDate - birth;
    const elapsedMs  = today - birth;
    const pct        = Math.min(100, Math.max(0, Math.round(elapsedMs / totalMs * 100)));

    document.getElementById('remainDays').textContent  = remainDays.toLocaleString();
    document.getElementById('remainYears').textContent = remainYears;
    document.getElementById('remainHours').textContent = remainHours;
    document.getElementById('currentAge').textContent  = age;
    document.getElementById('remainWeeks').textContent = remainWeeks.toLocaleString();
    document.getElementById('lifeBarTitle').textContent = lifespan + '歳';
    document.getElementById('lifeBarFill').style.width  = pct + '%';
    document.getElementById('lifeBarPct').textContent   = '人生の ' + pct + '% が経過（残り ' + (100 - pct) + '%）';

    let msg;
    if (remainDays > 20000) {
      msg = '🌱 まだたっぷりの時間があります。\n何でも始められる！';
    } else if (remainDays > 10000) {
      msg = '⏰ 折り返し地点に近づいています。\n今やりたいことを先送りにしないで。';
    } else if (remainDays > 5000) {
      msg = '🔥 残り' + remainDays.toLocaleString() + '日。\n1日1日を大切に積み重ねよう。';
    } else {
      msg = '✨ 残りの時間は宝物。\n大切な人と、大切なことに使いましょう。';
    }
    const msgEl = document.getElementById('message');
    const lines = msg.split('\n');
    msgEl.innerHTML = lines[0] + (lines[1] ? '<div class="msg-sub">' + lines[1] + '</div>' : '');

    document.getElementById('result').classList.add('show');
  }

  function resetAll() {
    document.getElementById('birthday').value = '';
    document.getElementById('lifespan').value = '85';
    document.getElementById('result').classList.remove('show');
    hideError();
  }
</script>
</body>
</html>
