<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割り勘計算</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
}

header {
  width: 100%;
  background: #1a1a1a;
  color: #fff;
  padding: 24px 20px 18px;
  text-align: center;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }

.card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 16px;
  padding: 24px 20px;
  margin: 20px 16px 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}

.field { margin-bottom: 20px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field input[type="number"] {
  width: 100%;
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 700;
  border: 2px solid #ebebeb;
  border-radius: 12px;
  outline: none;
  background: #fafaf8;
  color: #1a1a1a;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
.field input[type="number"]:focus { border-color: #1a1a1a; background: #fff; }

.round-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.rounding {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.rounding input[type="radio"] { display: none; }
.rounding label {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 13px 4px;
  border: 2px solid #ebebeb;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: #aaa;
  cursor: pointer;
  background: #fafaf8;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.3;
}
.rounding input[type="radio"]:checked + label {
  border-color: #1a1a1a;
  background: #1a1a1a;
  color: #fff;
}

.calc-btn {
  width: 100%;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  padding: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.15s, transform 0.1s;
}
.calc-btn:hover  { opacity: 0.85; }
.calc-btn:active { transform: scale(0.98); }

.result-card {
  display: none;
  width: 100%;
  max-width: 480px;
  background: #1a1a1a;
  border-radius: 16px;
  padding: 28px 20px;
  margin: 12px 16px 0;
  text-align: center;
}
.result-card.show { display: block; }

.result-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.result-amount {
  font-size: 52px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1;
}
.result-unit {
  font-size: 22px;
  color: rgba(255,255,255,0.55);
  margin-left: 4px;
}
.result-detail {
  margin-top: 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}

.error-msg {
  display: none;
  color: #e53e3e;
  font-size: 12px;
  font-weight: 700;
  margin-top: 6px;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>割り勘計算</h1>
  <p>人数と合計金額を入力してください</p>
</header>

<div class="card">

  <div class="field">
    <label for="people">人数</label>
    <input type="number" id="people" min="1" value="2" inputmode="numeric" placeholder="2">
    <div class="error-msg" id="err-people">1人以上の人数を入力してください</div>
  </div>

  <div class="field">
    <label for="total">合計金額（円）</label>
    <input type="number" id="total" min="0" inputmode="numeric" placeholder="5000">
    <div class="error-msg" id="err-total">合計金額を入力してください</div>
  </div>

  <div class="round-label">端数処理</div>
  <div class="rounding">
    <div>
      <input type="radio" name="round" id="r-ceil"  value="ceil">
      <label for="r-ceil">切り上げ</label>
    </div>
    <div>
      <input type="radio" name="round" id="r-round" value="round" checked>
      <label for="r-round">四捨五入</label>
    </div>
    <div>
      <input type="radio" name="round" id="r-floor" value="floor">
      <label for="r-floor">切り捨て</label>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">計算する</button>
</div>

<div class="result-card" id="result">
  <div class="result-label">1人あたり</div>
  <div>
    <span class="result-amount" id="perPerson"></span><span class="result-unit">円</span>
  </div>
  <div class="result-detail" id="resultDetail"></div>
</div>

<script>
const KEY = 'warikan_v1';

function saveState() {
  const people = document.getElementById('people').value;
  const total  = document.getElementById('total').value;
  const round  = document.querySelector('input[name="round"]:checked').value;
  localStorage.setItem(KEY, JSON.stringify({ people, total, round }));
}

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (d.people) document.getElementById('people').value = d.people;
    if (d.total)  document.getElementById('total').value  = d.total;
    if (d.round) {
      const el = document.getElementById('r-' + d.round);
      if (el) el.checked = true;
    }
    if (d.people && d.total) calculate();
  } catch (e) {}
}

function validate() {
  const people = parseInt(document.getElementById('people').value, 10);
  const total  = document.getElementById('total').value;
  let ok = true;

  if (!people || people < 1 || isNaN(people)) {
    document.getElementById('err-people').classList.add('show');
    ok = false;
  } else {
    document.getElementById('err-people').classList.remove('show');
  }

  if (total === '' || total === null) {
    document.getElementById('err-total').classList.add('show');
    ok = false;
  } else {
    document.getElementById('err-total').classList.remove('show');
  }

  return ok;
}

function calculate() {
  if (!validate()) {
    document.getElementById('result').classList.remove('show');
    return;
  }

  const people = parseInt(document.getElementById('people').value, 10);
  const total  = parseInt(document.getElementById('total').value, 10);
  const round  = document.querySelector('input[name="round"]:checked').value;

  const raw = total / people;
  let per;
  if      (round === 'ceil')  per = Math.ceil(raw);
  else if (round === 'floor') per = Math.floor(raw);
  else                        per = Math.round(raw);

  const label   = { ceil: '切り上げ', round: '四捨五入', floor: '切り捨て' }[round];
  const collect = per * people;
  const diff    = collect - total;
  const diffStr = diff === 0
    ? `${people}人でちょうど割り切れます`
    : `集金合計 ${collect.toLocaleString()}円（${diff > 0 ? '+' : ''}${diff}円の誤差） · ${label}`;

  document.getElementById('perPerson').textContent  = per.toLocaleString();
  document.getElementById('resultDetail').textContent = diffStr;
  document.getElementById('result').classList.add('show');

  saveState();
}

document.getElementById('people').addEventListener('input', calculate);
document.getElementById('total').addEventListener('input',  calculate);
document.querySelectorAll('input[name="round"]').forEach(el =>
  el.addEventListener('change', calculate)
);

loadState();
</script>
</body>
</html>
