<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボーナス計算</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.header {
  background: #000;
  color: #fff;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.card {
  background: #fff;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

label {
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 15px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #000;
  color: #fff;
  font-size: 16px;
  border: none;
  border-radius: 10px;
}

.result {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="header">💰 ボーナス計算</div>

<div class="card">

<label>基本給（円）</label>
<input type="number" id="salary">

<label>支給月数（例：2）</label>
<input type="number" id="months" step="0.1">

<label>税率（%）</label>
<input type="number" id="tax" value="20">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

</div>

<script>
// 初期ロード
window.onload = () => {
  document.getElementById("salary").value = localStorage.getItem("salary") || "";
  document.getElementById("months").value = localStorage.getItem("months") || "";
  document.getElementById("tax").value = localStorage.getItem("tax") || "20";
};

function calc() {
  const salary = Number(document.getElementById("salary").value);
  const months = Number(document.getElementById("months").value);
  const tax = Number(document.getElementById("tax").value);

  // 保存
  localStorage.setItem("salary", salary);
  localStorage.setItem("months", months);
  localStorage.setItem("tax", tax);

  const gross = salary * months;
  const taxAmount = gross * (tax / 100);
  const net = gross - taxAmount;

  document.getElementById("result").innerHTML = `
支給額：${gross.toLocaleString()}円<br>
税金：${taxAmount.toLocaleString()}円<br>
手取り：${net.toLocaleString()}円
`;
}
</script>

</body>
</html>
