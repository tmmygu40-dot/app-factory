<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フリーランス請求額計算</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f0f0f0;
  display:flex;
  justify-content:center;
  padding:16px;
}
.container{width:100%;max-width:480px;}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
  border-radius:12px 12px 0 0;
}

.card{
  background:#fff;
  padding:20px;
}

label{
  font-size:0.8rem;
  color:#555;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0 14px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
}

.result{
  background:#000;
  color:#fff;
  padding:20px;
  display:none;
}
.result.show{display:block;}

.big{
  font-size:1.6rem;
  font-weight:bold;
  margin-bottom:10px;
}

.sub{
  font-size:0.9rem;
  color:#ccc;
  line-height:1.7;
}

.share{
  background:#4CAF50;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>💻 請求額シミュレーター</h1>
</header>

<div class="card">

<label>時給（円）</label>
<input type="number" id="hourly">

<label>作業時間（時間）</label>
<input type="number" id="hours">

<label>消費税（%）</label>
<input type="number" id="tax" value="10">

<button onclick="calc()">計算する</button>

</div>

<div class="result" id="result">
<div class="big" id="total"></div>
<div class="sub" id="detail"></div>

<button class="share" onclick="share()">📤 シェア</button>
</div>

</div>

<script>
window.onload=()=>{
  hourly.value=localStorage.getItem("hourly")||"";
  hours.value=localStorage.getItem("hours")||"";
  tax.value=localStorage.getItem("tax")||"10";
};

function fmt(n){
  return Math.round(n).toLocaleString()+"円";
}

function calc(){
  const h=Number(hourly.value);
  const t=Number(hours.value);
  const taxRate=Number(tax.value)/100;

  if(!h||!t){
    alert("入力して");
    return;
  }

  localStorage.setItem("hourly",h);
  localStorage.setItem("hours",t);
  localStorage.setItem("tax",tax.value);

  const base=h*t;
  const taxAmount=base*taxRate;
  const total=base+taxAmount;

  totalEl.innerHTML="請求額："+fmt(total);
  detail.innerHTML=
    "税抜："+fmt(base)+"<br>" +
    "消費税："+fmt(taxAmount);

  result.classList.add("show");
}

function share(){
  const text=totalEl.innerText;

  if(navigator.share){
    navigator.share({
      title:"請求額シミュレーター",
      text:text,
      url:location.href
    });
  }else{
    navigator.clipboard.writeText(text);
    alert("コピーしたよ");
  }
}
</script>

</body>
</html>
