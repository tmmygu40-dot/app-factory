<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>転職年収シミュレーター</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  padding: 16px;
}

.container {
  width: 100%;
  max-width: 480px;
}

header {
  background: #1a1a1a;
  color: #fff;
  text-align: center;
  padding: 20px;
  border-radius: 12px 12px 0 0;
}

.card {
  background: #fff;
  padding: 20px;
}

label {
  font-size: 0.8rem;
  color: #555;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 8px;
}

.result {
  background: #000;
  color: #fff;
  padding: 20px;
  display: none;
}

.result.show { display: block; }

.big {
  font-size: 1.6rem;
  font-weight: bold;
  margin-bottom: 10px;
}

.sub {
  font-size: 0.9rem;
  color: #ccc;
}

.share {
  background: #4CAF50;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>💼 転職年収シミュレーター</h1>
</header>

<div class="card">

<label>今の年収（円）</label>
<input type="number" id="current">

<label>転職後の年収（円）</label>
<input type="number" id="next">

<label>年齢</label>
<input type="number" id="age">

<label>比較年数（年）</label>
<input type="number" id="years" value="10">

<button onclick="calc()">計算する</button>

</div>

<div class="result" id="result">

<div class="big" id="diff"></div>
<div class="sub" id="detail"></div>

<button class="share" onclick="share()">📤 シェア</button>

</div>

</div>

<script>
window.onload = () => {
  current.value = localStorage.getItem("current") || "";
  next.value = localStorage.getItem("next") || "";
  age.value = localStorage.getItem("age") || "";
  years.value = localStorage.getItem("years") || "10";
};

function fmt(n){
  return Math.round(n/10000) + "万円";
}

function calc(){
  const c = Number(current.value);
  const n = Number(next.value);
  const y = Number(years.value);

  if(!c || !n || !y){
    alert("入力して");
    return;
  }

  localStorage.setItem("current", c);
  localStorage.setItem("next", n);
  localStorage.setItem("age", age.value);
  localStorage.setItem("years", y);

  const diff = (n - c) * y;

  diffEl.innerHTML = "差額：" + fmt(diff);
  detail.innerHTML = y + "年で " + fmt(diff) + " の差";

  result.classList.add("show");
}

function share(){
  const text = diffEl.innerText;

  if(navigator.share){
    navigator.share({
      title:"転職シミュレーター",
      text:text,
      url:location.href
    });
  }else{
    navigator.clipboard.writeText(text);
    alert("コピーしたよ");
  }
}
</script>

</body>
</html>
