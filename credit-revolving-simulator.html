<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リボ払い地獄シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .field label { font-size: 0.8rem; color: #555; margin-bottom: 5px; display: block; }
  .field .sublabel { font-size: 0.72rem; color: #aaa; margin-bottom: 5px; display: block; }
  input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input[type="number"]:focus { border-color: #1a1a1a; }
  .preset-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .preset-row button {
    flex: 1;
    padding: 8px 4px;
    font-size: 0.82rem;
    font-weight: 600;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-row button.active {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: #fff;
  }
  .btn-calc {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-calc:active { opacity: 0.8; }
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .error-msg {
    background: #fff0f0;
    color: #c0392b;
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #f5c6c6;
    display: none;
  }
  .error-msg.show { display: block; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .result.show { display: flex; }
  .result-hero {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 10px;
    padding: 20px 14px;
    text-align: center;
  }
  .result-hero-label { font-size: 0.75rem; color: #e88; margin-bottom: 6px; }
  .result-hero-value { font-size: 2.2rem; font-weight: 700; color: #ff6b6b; line-height: 1.2; }
  .result-hero-sub { font-size: 0.8rem; color: #aaa; margin-top: 8px; }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-cell {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px;
  }
  .result-cell-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-cell-value { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .result-cell-value.red { color: #ff6b6b; }
  .result-breakdown {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
  }
  .breakdown-label { font-size: 0.7rem; color: #aaa; margin-bottom: 8px; }
  .breakdown-bar-wrap { margin-bottom: 6px; }
  .breakdown-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #ccc;
    margin-bottom: 4px;
  }
  .breakdown-bar-track {
    background: #3a3a3a;
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }
  .breakdown-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .fill-principal { background: #4a9eff; }
  .fill-interest  { background: #ff6b6b; }
  .result-comment {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
    font-size: 0.82rem;
    color: #ffaaaa;
    line-height: 1.7;
  }
  .result-comment .comment-label { font-size: 0.7rem; color: #e88; margin-bottom: 4px; font-weight: 700; }
  .notice {
    font-size: 0.72rem;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">💳</span>
    <h1>リボ払い地獄シミュレーター</h1>
    <p>利用金額・年利・月払いから総支払額を試算</p>
  </header>

  <div class="card">
    <div class="field">
      <label>利用金額（円）</label>
      <input type="number" id="balance" inputmode="numeric" placeholder="例：300000">
    </div>
    <div class="field">
      <label>年利（%）</label>
      <span class="sublabel">一般的なリボ払いは年利15〜18%程度</span>
      <input type="number" id="rate" inputmode="decimal" placeholder="例：15" value="15">
      <div class="preset-row" id="rateGroup">
        <button onclick="setRate(this, 12)">12%</button>
        <button onclick="setRate(this, 15)" class="active">15%</button>
        <button onclick="setRate(this, 18)">18%</button>
      </div>
    </div>
    <div class="field">
      <label>毎月の支払額（円）</label>
      <span class="sublabel">元金＋利息を含む月々の支払額</span>
      <input type="number" id="monthly" inputmode="numeric" placeholder="例：10000">
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-calc" onclick="calculate()">計算する</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <div class="result" id="result">
    <div class="result-hero">
      <div class="result-hero-label">⚠️ 総支払額</div>
      <div class="result-hero-value" id="totalPayment"></div>
      <div class="result-hero-sub" id="heroSub"></div>
    </div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-label">利息合計</div>
        <div class="result-cell-value red" id="totalInterest"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">完済まで</div>
        <div class="result-cell-value" id="months"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">初月の元金返済</div>
        <div class="result-cell-value" id="firstPrincipal"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">初月の利息</div>
        <div class="result-cell-value red" id="firstInterest"></div>
      </div>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-label">総支払額の内訳</div>
      <div class="breakdown-bar-wrap">
        <div class="breakdown-bar-label">
          <span>元金</span>
          <span id="principalPct"></span>
        </div>
        <div class="breakdown-bar-track">
          <div class="breakdown-bar-fill fill-principal" id="principalBar" style="width:0%"></div>
        </div>
      </div>
      <div class="breakdown-bar-wrap">
        <div class="breakdown-bar-label">
          <span>利息</span>
          <span id="interestPct"></span>
        </div>
        <div class="breakdown-bar-track">
          <div class="breakdown-bar-fill fill-interest" id="interestBar" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="result-comment">
      <div class="comment-label">⚠️ 注意</div>
      <div id="commentText"></div>
    </div>
    <div class="notice">
      ※ これは一般向けの簡易シミュレーションです。実際の残高・手数料・返済方式は各カード会社の契約条件によって異なります。
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  function setRate(btn, val) {
    document.getElementById('rate').value = val;
    document.querySelectorAll('#rateGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function fmt(n) { return Math.round(n).toLocaleString() + ' 円'; }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function calculate() {
    hideError();
    const balance = parseFloat(document.getElementById('balance').value);
    const rate    = parseFloat(document.getElementById('rate').value);
    const monthly = parseFloat(document.getElementById('monthly').value);

    if (isNaN(balance) || balance <= 0)  { showError('利用金額を正しく入力してください'); return; }
    if (isNaN(rate)    || rate <= 0)     { showError('年利を正しく入力してください'); return; }
    if (isNaN(monthly) || monthly <= 0)  { showError('毎月の支払額を正しく入力してください'); return; }

    const monthlyRate   = rate / 100 / 12;
    const firstInterest = Math.round(balance * monthlyRate);
    const firstPrincipal = monthly - firstInterest;

    if (firstPrincipal <= 0) {
      showError('毎月の支払額が利息以下のため完済できません。支払額を ' + Math.ceil(balance * monthlyRate + 1).toLocaleString() + ' 円以上にしてください。');
      return;
    }

    let remaining     = balance;
    let totalPaid     = 0;
    let monthCount    = 0;
    const MAX_MONTHS  = 1200;

    while (remaining > 0 && monthCount < MAX_MONTHS) {
      const interest = remaining * monthlyRate;
      const payment  = Math.min(monthly, remaining + interest);
      remaining      = remaining + interest - payment;
      totalPaid     += payment;
      monthCount++;
    }

    const totalInterest = totalPaid - balance;
    const interestPct   = Math.round(totalInterest / totalPaid * 100);
    const principalPct  = 100 - interestPct;
    const years         = Math.floor(monthCount / 12);
    const mons          = monthCount % 12;
    const periodStr     = years > 0
      ? years + '年' + (mons > 0 ? mons + 'ヶ月' : '')
      : mons + 'ヶ月';

    document.getElementById('totalPayment').textContent  = fmt(totalPaid);
    document.getElementById('heroSub').textContent       = '利用額 ' + balance.toLocaleString() + '円 → 総支払 ' + Math.round(totalPaid).toLocaleString() + '円';
    document.getElementById('totalInterest').textContent = fmt(totalInterest);
    document.getElementById('months').textContent        = periodStr + '（' + monthCount + '回）';
    document.getElementById('firstPrincipal').textContent = fmt(firstPrincipal);
    document.getElementById('firstInterest').textContent  = fmt(firstInterest);
    document.getElementById('principalPct').textContent   = principalPct + '%';
    document.getElementById('interestPct').textContent    = interestPct + '%';
    document.getElementById('principalBar').style.width   = principalPct + '%';
    document.getElementById('interestBar').style.width    = interestPct + '%';

    let comment;
    if (interestPct >= 40) {
      comment = '支払総額の ' + interestPct + '% が利息です！利用額 ' + balance.toLocaleString() + '円 に対して ' + Math.round(totalInterest).toLocaleString() + '円 もの利息が発生します。可能な限り繰り上げ返済や一括返済を検討しましょう。';
    } else if (interestPct >= 20) {
      comment = '支払総額の ' + interestPct + '% が利息です。リボ払いは長期化するほど損が大きくなります。毎月の支払額を増やすと利息を大幅に減らせます。';
    } else {
      comment = '比較的早期に完済できる試算です。ただしリボ払いの利用は慎重に。一括払いに切り替えられる場合は積極的に検討しましょう。';
    }
    document.getElementById('commentText').textContent = comment;
    document.getElementById('result').classList.add('show');
  }

  function resetAll() {
    document.getElementById('balance').value = '';
    document.getElementById('rate').value    = '15';
    document.getElementById('monthly').value = '';
    document.querySelectorAll('#rateGroup button').forEach((b, i) => {
      b.classList.toggle('active', i === 1);
    });
    document.getElementById('result').classList.remove('show');
    hideError();
  }
</script>
</body>
</html>
