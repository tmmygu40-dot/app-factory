<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日数カウント</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 56px;
}

header {
  width: 100%;
  background: #1a1a1a;
  color: #fff;
  padding: 24px 20px 18px;
  text-align: center;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px; }

.card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 16px;
  padding: 24px 20px;
  margin: 20px 16px 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}

.field { margin-bottom: 20px; }
.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.input-row {
  display: flex;
  gap: 8px;
}

.input-row input[type="date"] {
  flex: 1;
  padding: 13px 14px;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid #ebebeb;
  border-radius: 12px;
  outline: none;
  background: #fafaf8;
  color: #1a1a1a;
  transition: border-color 0.15s;
  min-width: 0;
}
.input-row input[type="date"]:focus { border-color: #1a1a1a; background: #fff; }

.today-btn {
  padding: 13px 14px;
  font-size: 12px;
  font-weight: 700;
  border: 2px solid #ebebeb;
  border-radius: 12px;
  background: #fafaf8;
  color: #555;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.today-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }

.calc-btn {
  width: calc(100% - 32px);
  max-width: 480px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  padding: 16px;
  margin-top: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.15s, transform 0.1s;
}
.calc-btn:hover  { opacity: 0.85; }
.calc-btn:active { transform: scale(0.98); }

.result-card {
  display: none;
  width: calc(100% - 32px);
  max-width: 480px;
  background: #1a1a1a;
  border-radius: 16px;
  padding: 28px 20px;
  margin-top: 12px;
  text-align: center;
}
.result-card.show { display: block; }

.result-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.result-main {
  font-size: 52px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1;
}
.result-unit {
  font-size: 20px;
  color: rgba(255,255,255,0.5);
  margin-left: 4px;
}
.result-sub {
  margin-top: 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}

.back-link {
  margin-top: 28px;
  font-size: 13px;
  color: #aaa;
  text-decoration: none;
}
.back-link:hover { color: #555; }
</style>
</head>
<body>

<header>
  <h1>日数カウント</h1>
  <p>開始日と終了日を入力してください</p>
</header>

<div class="card">
  <div class="field">
    <label>開始日</label>
    <div class="input-row">
      <input type="date" id="startDate">
      <button class="today-btn" onclick="setToday('startDate')">今日</button>
    </div>
  </div>
  <div class="field">
    <label>終了日</label>
    <div class="input-row">
      <input type="date" id="endDate">
      <button class="today-btn" onclick="setToday('endDate')">今日</button>
    </div>
  </div>
</div>

<button class="calc-btn" onclick="calculate()">計算する</button>

<div class="result-card" id="result">
  <div class="result-label" id="resultLabel">日数</div>
  <div>
    <span class="result-main" id="resultMain"></span><span class="result-unit">日間</span>
  </div>
  <div class="result-sub" id="resultSub"></div>
</div>

<a class="back-link" href="index.html">← アプリ一覧に戻る</a>

<script>
const STORAGE_KEY = 'days_v1';

function today() {
  return new Date().toISOString().slice(0, 10);
}

function setToday(id) {
  document.getElementById(id).value = today();
  calculate();
}

function fmt(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function calculate() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;

  if (!s || !e) {
    document.getElementById('result').classList.remove('show');
    return;
  }

  const start = new Date(s);
  const end   = new Date(e);
  const diff  = Math.round((end - start) / (1000 * 60 * 60 * 24));

  const label = diff >= 0 ? '日数' : '差分';
  const days  = Math.abs(diff);
  const note  = diff < 0 ? '（終了日が開始日より前）' : diff === 0 ? '同じ日です' : '';

  document.getElementById('resultLabel').textContent = label;
  document.getElementById('resultMain').textContent  = days;
  document.getElementById('resultSub').textContent   =
    `${fmt(s)} → ${fmt(e)}${note ? '\n' + note : ''}`;
  document.getElementById('result').classList.add('show');

  localStorage.setItem(STORAGE_KEY, JSON.stringify({ start: s, end: e }));
}

(function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.start) document.getElementById('startDate').value = d.start;
    if (d.end)   document.getElementById('endDate').value   = d.end;
    if (d.start && d.end) calculate();
  } catch (e) {}
})();

document.getElementById('startDate').addEventListener('change', calculate);
document.getElementById('endDate').addEventListener('change', calculate);
</script>
</body>
</html>
