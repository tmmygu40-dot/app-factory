<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出産費用シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 480px; }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 22px 16px 18px;
    border-radius: 12px 12px 0 0;
  }
  header .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field label { font-size: 0.8rem; color: #555; margin-bottom: 5px; display: block; }
  .field .sublabel { font-size: 0.72rem; color: #aaa; margin-bottom: 6px; display: block; }
  input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input[type="number"]:focus { border-color: #1a1a1a; }
  .select-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .select-grid button {
    width: 100%;
    padding: 12px 14px;
    font-size: 0.88rem;
    font-weight: 600;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #555;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .select-grid button.active {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: #fff;
  }
  .btn-calc {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-calc:active { opacity: 0.8; }
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .error-msg {
    background: #fff0f0;
    color: #c0392b;
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #f5c6c6;
    display: none;
  }
  .error-msg.show { display: block; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .result.show { display: flex; }
  .result-hero {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 20px 14px;
    text-align: center;
  }
  .result-hero-label { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }
  .result-hero-value { font-size: 2.2rem; font-weight: 700; color: #fff; line-height: 1.2; }
  .result-hero-sub { font-size: 0.78rem; color: #aaa; margin-top: 8px; }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-cell {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px;
  }
  .result-cell-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-cell-value { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .result-cell-value.green { color: #2ecc71; }
  .result-breakdown {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
  }
  .breakdown-label { font-size: 0.7rem; color: #aaa; margin-bottom: 10px; }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #ccc;
    padding: 5px 0;
    border-bottom: 1px solid #333;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row span { color: #fff; font-weight: 600; }
  .result-comment {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 13px 14px;
    font-size: 0.82rem;
    color: #ccc;
    line-height: 1.7;
  }
  .result-comment .comment-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .result-comment .comment-text { color: #fff; font-weight: 600; }
  .notice {
    font-size: 0.72rem;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="emoji">👶</span>
    <h1>出産費用シミュレーター</h1>
    <p>入院・分娩・補助金から自己負担額を試算</p>
  </header>

  <div class="card">
    <div class="field">
      <label>出産方法</label>
      <div class="select-grid" id="methodGroup">
        <button onclick="selectMethod(this,'natural')" class="active">🌸 自然分娩　平均費用の初期値：50万円</button>
        <button onclick="selectMethod(this,'csection')">🏥 帝王切開　平均費用の初期値：60万円（保険適用あり）</button>
      </div>
    </div>

    <div class="field">
      <label>入院日数（日）</label>
      <input type="number" id="days" inputmode="numeric" placeholder="例：5">
    </div>

    <div class="field">
      <label>出産費用（円）</label>
      <span class="sublabel" id="costHint">自然分娩の平均は約50万円。実際の金額に合わせて変更できます</span>
      <input type="number" id="birthCost" inputmode="numeric" placeholder="例：500000" value="500000">
    </div>

    <div class="field">
      <label>出産育児一時金（円）</label>
      <span class="sublabel">2023年4月より原則50万円（産科医療補償制度加入施設）</span>
      <input type="number" id="subsidy" inputmode="numeric" placeholder="例：500000" value="500000">
    </div>

    <div class="field">
      <label>その他費用（円）<span style="color:#aaa;font-weight:400;">　任意</span></label>
      <span class="sublabel">ベビー用品・マタニティ費用・交通費など</span>
      <input type="number" id="other" inputmode="numeric" placeholder="例：200000">
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-calc" onclick="calculate()">計算する</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <div class="result" id="result">
    <div class="result-hero">
      <div class="result-hero-label">総出産費用</div>
      <div class="result-hero-value" id="grandTotal"></div>
      <div class="result-hero-sub" id="heroSub"></div>
    </div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-label">自己負担額</div>
        <div class="result-cell-value" id="selfBurden"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">出産育児一時金</div>
        <div class="result-cell-value green" id="subsidyDisp"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">分娩・入院費</div>
        <div class="result-cell-value" id="birthDisp"></div>
      </div>
      <div class="result-cell">
        <div class="result-cell-label">その他費用</div>
        <div class="result-cell-value" id="otherDisp"></div>
      </div>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-label">費用内訳</div>
      <div class="breakdown-row">分娩・入院費       <span id="bBirth"></span></div>
      <div class="breakdown-row">その他費用         <span id="bOther"></span></div>
      <div class="breakdown-row">出産育児一時金     <span id="bSubsidy" style="color:#2ecc71"></span></div>
      <div class="breakdown-row" id="perDayRow" style="display:none">1日あたり入院費（参考） <span id="bPerDay"></span></div>
    </div>
    <div class="result-comment">
      <div class="comment-label">ひとこと</div>
      <div class="comment-text" id="commentText"></div>
    </div>
    <div class="notice">
      ※ 病院・地域・分娩方法・入院日数により費用は大きく異なります。帝王切開は保険適用部分あり。出産育児一時金の受取方法は直接支払制度が一般的です。正確な費用は各医療機関にご確認ください。
    </div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  let selectedMethod = 'natural';

  function selectMethod(btn, method) {
    selectedMethod = method;
    document.querySelectorAll('#methodGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const defaults = { natural: { cost: 500000, hint: '自然分娩の平均は約50万円。実際の金額に合わせて変更できます' },
                       csection: { cost: 600000, hint: '帝王切開は保険適用あり。窓口負担は平均約60万円前後（高額療養費制度の対象）' } };
    document.getElementById('birthCost').value = defaults[method].cost;
    document.getElementById('costHint').textContent = defaults[method].hint;
  }

  function fmt(n) { return Math.round(n).toLocaleString() + ' 円'; }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function calculate() {
    hideError();
    const birthCost = parseFloat(document.getElementById('birthCost').value);
    const subsidy   = parseFloat(document.getElementById('subsidy').value);
    const other     = parseFloat(document.getElementById('other').value) || 0;
    const days      = parseFloat(document.getElementById('days').value);

    if (isNaN(birthCost) || birthCost < 0) { showError('出産費用を正しく入力してください'); return; }
    if (isNaN(subsidy)   || subsidy < 0)   { showError('出産育児一時金を正しく入力してください'); return; }
    if (other < 0) { showError('その他費用は0以上で入力してください'); return; }

    const grandTotal = birthCost + other;
    const selfBurden = Math.max(0, grandTotal - subsidy);
    const surplus    = subsidy - birthCost;
    const methodName = selectedMethod === 'natural' ? '自然分娩' : '帝王切開';
    const hasDays    = !isNaN(days) && days > 0;
    const perDay     = hasDays ? Math.round(birthCost / days) : 0;

    document.getElementById('grandTotal').textContent = fmt(grandTotal);
    document.getElementById('heroSub').textContent    = methodName + (hasDays ? ' / 入院' + days + '日' : '');
    document.getElementById('selfBurden').textContent = fmt(selfBurden);
    document.getElementById('subsidyDisp').textContent= fmt(subsidy);
    document.getElementById('birthDisp').textContent  = fmt(birthCost);
    document.getElementById('otherDisp').textContent  = other > 0 ? fmt(other) : '―';
    document.getElementById('bBirth').textContent     = fmt(birthCost);
    document.getElementById('bOther').textContent     = other > 0 ? fmt(other) : '―';
    document.getElementById('bSubsidy').textContent   = '▲ ' + fmt(subsidy);

    const perDayRow = document.getElementById('perDayRow');
    if (hasDays) {
      document.getElementById('bPerDay').textContent = fmt(perDay);
      perDayRow.style.display = 'flex';
    } else {
      perDayRow.style.display = 'none';
    }

    let comment;
    if (surplus > 0) {
      comment = '出産育児一時金が費用を上回り、差額 ' + fmt(surplus) + ' が戻ってくる計算です。その他費用の自己負担に備えておきましょう。';
    } else if (selfBurden < 50000) {
      comment = '自己負担は比較的少なめです。ただし、ベビー用品や産後ケアの費用も別途かかるため、余裕を持った準備を。';
    } else if (selfBurden < 200000) {
      comment = '自己負担は ' + fmt(selfBurden) + ' の見込みです。出産前に医療費控除の申請も忘れずに確認しましょう。';
    } else {
      comment = '自己負担が ' + fmt(selfBurden) + ' と大きめです。高額療養費制度の対象になる場合もあるので、加入している健康保険に確認してみましょう。';
    }
    document.getElementById('commentText').textContent = comment;
    document.getElementById('result').classList.add('show');
  }

  function resetAll() {
    document.getElementById('days').value      = '';
    document.getElementById('birthCost').value = '500000';
    document.getElementById('subsidy').value   = '500000';
    document.getElementById('other').value     = '';
    selectedMethod = 'natural';
    document.querySelectorAll('#methodGroup button').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
    document.getElementById('costHint').textContent = '自然分娩の平均は約50万円。実際の金額に合わせて変更できます';
    document.getElementById('result').classList.remove('show');
    hideError();
  }
</script>
</body>
</html>
