<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つみたてNISAシミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 480px;
  }
  header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 20px 16px 16px;
    border-radius: 12px 12px 0 0;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .card {
    background: #fff;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 4px;
    display: block;
  }
  input {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
  }
  input:focus { border-color: #1a1a1a; }
  button {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: 0.8; }
  .result {
    background: #1a1a1a;
    color: #fff;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
    display: none;
  }
  .result.show { display: block; }
  .result-label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
  .result-value { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; }
  .result-sub { font-size: 0.85rem; color: #ccc; line-height: 1.8; }
  .result-sub span { color: #fff; font-weight: 600; }
  .badge {
    display: inline-block;
    background: #2ecc71;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>つみたてNISAシミュレーター<span class="badge">非課税</span></h1>
    <p>毎月積立 × 複利で将来資産を試算</p>
  </header>

  <div class="card">
    <div>
      <label>毎月の積立額（円）</label>
      <input type="number" id="monthly" inputmode="numeric" placeholder="例：33333">
    </div>
    <div>
      <label>年利（%）</label>
      <input type="number" id="rate" inputmode="decimal" placeholder="例：5">
    </div>
    <div>
      <label>積立年数（年）</label>
      <input type="number" id="years" inputmode="numeric" placeholder="例：20">
    </div>
    <button onclick="calculate()">計算する</button>
  </div>

  <div class="result" id="result">
    <div class="result-label">最終積立額（非課税）</div>
    <div class="result-value" id="finalAmount"></div>
    <div class="result-sub" id="breakdown"></div>
  </div>

  <a class="back" href="index.html">← アプリ一覧に戻る</a>
</div>

<script>
  const STORAGE_KEY = 'nisa_v1';

  function calculate() {
    const monthly = parseFloat(document.getElementById('monthly').value);
    const rate    = parseFloat(document.getElementById('rate').value);
    const years   = parseFloat(document.getElementById('years').value);

    if ([monthly, rate, years].some(v => isNaN(v) || v <= 0)) {
      alert('すべての項目に正の数値を入力してください');
      return;
    }

    const r = rate / 100 / 12;
    const n = years * 12;
    const total = Math.round(monthly * (Math.pow(1 + r, n) - 1) / r);
    const principal = Math.round(monthly * n);
    const profit = total - principal;

    document.getElementById('finalAmount').textContent = total.toLocaleString() + ' 円';
    document.getElementById('breakdown').innerHTML =
      '元本合計：<span>' + principal.toLocaleString() + ' 円</span><br>' +
      '運用益（非課税）：<span>' + profit.toLocaleString() + ' 円</span><br>' +
      '倍率：<span>' + (Math.round(total / principal * 100) / 100).toFixed(2) + ' 倍</span><br>' +
      '積立期間：<span>' + years + ' 年（' + n + ' ヶ月）</span>';

    document.getElementById('result').classList.add('show');

    localStorage.setItem(STORAGE_KEY, JSON.stringify({ monthly, rate, years }));
  }

  function load() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const d = JSON.parse(saved);
    document.getElementById('monthly').value = d.monthly;
    document.getElementById('rate').value    = d.rate;
    document.getElementById('years').value   = d.years;
  }

  load();
</script>
</body>
</html>
