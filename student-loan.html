<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奨学金返済シミュレーター</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f5f5f5;
}

.container{
  max-width:480px;
  margin:0 auto;
}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}

.card{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:12px;
}

label{
  font-size:14px;
  color:#555;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0 15px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.result{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:12px;
  display:none;
}

.result.show{display:block;}

.big{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🎓 奨学金返済シミュレーター</h1>
</header>

<div class="card">

<label>借入総額（円）</label>
<input type="number" id="loan">

<label>毎月の返済額（円）</label>
<input type="number" id="monthly">

<label>金利（%）</label>
<input type="number" id="rate" value="1">

<button onclick="calc()">計算する</button>

</div>

<div class="result" id="result">
<div class="big" id="yearsText"></div>
<div id="detail"></div>
</div>

</div>

<script>
function calc(){
  const l=Number(loan.value);
  const m=Number(monthly.value);
  const r=Number(rate.value)/100/12;

  if(!l||!m){
    alert("入力して");
    return;
  }

  let balance=l;
  let months=0;

  while(balance>0 && months<1200){
    balance=balance+(balance*r)-m;
    months++;
  }

  const y=Math.floor(months/12);
  const mm=months%12;

  yearsText.innerHTML="完済まで：約 "+y+"年 "+mm+"ヶ月";

  result.classList.add("show");
}
</script>

</body>
</html>
